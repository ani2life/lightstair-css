base_c: 0.01 # OKLCH 기준 채도(Chroma)
base_h: 240 # OKLCH 기준 색상(Hue)

tx_l: 0.22 # 시작 글자 밝기
bg_l: 1.0 # 시작 배경 밝기
bd_l: 0.92 # 시작 테두리 밝기

dark_tx_l: 0.94 # 다크모드 시작 글자 밝기
dark_bg_l: 0.18 # 다크모드 시작 배경 밝기
dark_bd_l: 0.25 # 다크모드 시작 테두리 밝기

tx_l_gap: 0.16 # 글자 밝기 간격
bg_l_gap: 0.06 # 배경 밝기 간격
bd_l_gap: 0.09 # 테두리 밝기 간격

tx_l_steps: 5 # 글자 밝기 단계
bg_l_steps: 5 # 배경 밝기 단계
bd_l_steps: 5 # 테두리 밝기 단계
