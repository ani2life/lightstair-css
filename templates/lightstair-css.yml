tx_base_c: 0.01 # 기본 글자 채도(Chroma)
tx_base_h: 240 # 기본 글자 색상(Hue)

bg_base_c: 0.01 # 기본 배경 채도(Chroma)
bg_base_h: 240 # 기본 배경 색상(Hue)

bd_base_c: 0.01 # 기본 테두리 채도(Chroma)
bd_base_h: 240 # 기본 테두리 색상(Hue)

tx_init_l: 0.22 # 초기 글자 밝기(Lightness)
bg_init_l: 1.0 # 초기 배경 밝기(Lightness)
bd_init_l: 0.92 # 초기 테두리 밝기(Lightness)

dark_tx_init_l: 0.94 # 다크모드 초기 글자 밝기
dark_bg_init_l: 0.18 # 다크모드 초기 배경 밝기
dark_bd_init_l: 0.25 # 다크모드 초기 테두리 밝기

tx_l_gap: 0.16 # 글자 밝기 간격
bg_l_gap: 0.06 # 배경 밝기 간격
bd_l_gap: 0.09 # 테두리 밝기 간격

tx_l_steps: 5 # 글자 밝기 단계
bg_l_steps: 5 # 배경 밝기 단계
bd_l_steps: 5 # 테두리 밝기 단계

tx_prefix: tx # 글자 색상 CSS 변수 접두어
bg_prefix: bg # 배경 색상 CSS 변수 접두어
bd_prefix: bd # 테두리 색상 CSS 변수 접두어

tx_start_number: 1 # 글자 색상 CSS 변수 시작 번호
bg_start_number: 1 # 배경 색상 CSS 변수 시작 번호
bd_start_number: 1 # 테두리 색상 CSS 변수 시작 번호
