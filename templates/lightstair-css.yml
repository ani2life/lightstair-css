# ================================================
# L, C, H 값은 OKLCH 색상 공간을 기준으로 합니다.
# ================================================

tx_base_c: 0.01 # 기본 글자 채도(Chroma)
tx_base_h: 250 # 기본 글자 색상(Hue)

bg_base_c: 0.01 # 기본 배경 채도(Chroma)
bg_base_h: 250 # 기본 배경 색상(Hue)

bd_base_c: 0.01 # 기본 테두리 채도(Chroma)
bd_base_h: 250 # 기본 테두리 색상(Hue)

tx_init_l: 0.31 # 초기 글자 밝기(Lightness)
bg_init_l: 0.96 # 초기 배경 밝기(Lightness)
bd_init_l: 0.92 # 초기 테두리 밝기(Lightness)

dark_tx_init_l: 0.85 # 다크모드 초기 글자 밝기
dark_bg_init_l: 0.22 # 다크모드 초기 배경 밝기
dark_bd_init_l: 0.26 # 다크모드 초기 테두리 밝기

tx_l_gap: 0.09 # 글자 밝기 간격
bg_l_gap: -0.04 # 배경 밝기 간격
bd_l_gap: -0.04 # 테두리 밝기 간격

dark_tx_l_gap: -0.09 # 다크모드 글자 밝기 간격
dark_bg_l_gap: 0.04 # 다크모드 배경 밝기 간격
dark_bd_l_gap: 0.04 # 다크모드 테두리 밝기 간격

tx_l_steps: 4 # 글자 밝기 단계
bg_l_steps: 4 # 배경 밝기 단계
bd_l_steps: 4 # 테두리 밝기 단계

tx_prefix: tx # 글자 색상 CSS 변수 접두어
bg_prefix: bg # 배경 색상 CSS 변수 접두어
bd_prefix: bd # 테두리 색상 CSS 변수 접두어
