<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Preview | LightStair CSS</title>
<link href="/css" rel="stylesheet">
<style>
    :root {
        color-scheme: light dark;
    }

    html {
        font-size: 16px;
    }

    body {
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Course New", monospace;
        margin: 0;
        padding: 2rem;
    }

    main > section {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 1.5rem;
        margin-top: 2rem;
    }

    .overview-card {
        display: flex;
        gap: 0.5rem;

        padding: 1.5rem;
        /* border-width: 1px;
        border-style: solid; */
        border-radius: 8px;

        .overview-card__txs,
        .overview-card__bgs,
        .overview-card__bds {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .overview-card__txs > .tx-step {
            /* font-size: 0.9rem; */
        }

        .overview-card__bgs > .bg-step,
        .overview-card__bds > .bd-step {
            box-sizing: border-box;
            display: flex;
            align-items: center;
            height: 2rem;
            padding: 0 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .overview-card__bds > .bd-step {
            border-width: 1px;
            border-style: solid;
        }
    }

    .combo-card {
        padding: 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        border-width: 1px;
        border-style: solid;
    }
</style>

</head>
<body>

<header>
    <h1>Style Preview</h1>
</header>

<main>
    <section id="overviewSection"></section>
    <section id="comboSection"></section>
</main>

<template id="overviewCard">
    <div class="overview-card">
        <div class="overview-card__txs"></div>
        <div class="overview-card__bgs"></div>
        <div class="overview-card__bds"></div>
    </div>
</template>

<template id="comboCard">
    <div class="combo-card"></div>
</template>

<script>
(async function () {
    try {
        const res = await fetch('/config');
        if (!res.ok) {
            throw new Error('Config fetch failed: ' + res.status);
        }
        const config = await res.json();
        applyConfig(config);
        applyComboCards(config);
    } catch (err) {
        console.error('[Preview] Failed to load config:', err.message);
    }

    function varName(prefix, num) {
        return `--${prefix}-${num}`;
    }

    function applyConfig(config) {
        const {
            tx_l_steps, bg_l_steps, bd_l_steps,
            tx_prefix, bg_prefix, bd_prefix,
            tx_start_number, bg_start_number, bd_start_number,
        } = config;

        const template = document.getElementById('overviewCard');

        for (let n = 0; n < bg_l_steps; n++) {
            const clone = document.importNode(template.content, true);
            const card = clone.querySelector('.overview-card');
            const textContainer = clone.querySelector('.overview-card__txs');
            const bgContainer = clone.querySelector('.overview-card__bgs');
            const borderContainer = clone.querySelector('.overview-card__bds');

            card.style.backgroundColor = `var(${varName(bg_prefix, n + bg_start_number)})`;

            for (let i = 0; i < tx_l_steps; i++) {
                const div = document.createElement('div');
                div.className = 'tx-step';
                const txVar = varName(tx_prefix, i + tx_start_number);
                div.style.color = `var(${txVar})`;
                div.textContent = txVar;
                textContainer.appendChild(div);
            }

            for (let j = 0; j < bg_l_steps; j++) {
                const div = document.createElement('div');
                div.className = 'bg-step';
                const bgVar = varName(bg_prefix, j + bg_start_number);
                div.style.backgroundColor = `var(${bgVar})`;
                div.textContent = bgVar;
                bgContainer.appendChild(div);
            }

            for (let k = 0; k < bd_l_steps; k++) {
                const div = document.createElement('div');
                div.className = 'bd-step';
                const bdVar = varName(bd_prefix, k + bd_start_number);
                div.style.borderColor = `var(${bdVar})`;
                div.textContent = bdVar;
                borderContainer.appendChild(div);
            }

            document.getElementById('overviewSection').appendChild(clone);
        }
    }

    function applyComboCards(config) {
        const {
            tx_l_steps, bg_l_steps, bd_l_steps,
            tx_prefix, bg_prefix, bd_prefix,
            tx_start_number, bg_start_number, bd_start_number,
        } = config;

        const template = document.getElementById('comboCard');

        for (let bg = 0; bg < bg_l_steps; bg++) {
            for (let tx = 0; tx < tx_l_steps; tx++) {
                for (let bd = 0; bd < bd_l_steps; bd++) {
                    const clone = document.importNode(template.content, true);
                    const card = clone.querySelector('.combo-card');

                    const txVar = varName(tx_prefix, tx + tx_start_number);
                    const bgVar = varName(bg_prefix, bg + bg_start_number);
                    const bdVar = varName(bd_prefix, bd + bd_start_number);
                    card.style.color = `var(${txVar})`;
                    card.style.backgroundColor = `var(${bgVar})`;
                    card.style.borderColor = `var(${bdVar})`;
                    card.innerHTML = `${txVar}<br>${bgVar}<br>${bdVar}<br>`;

                    document.getElementById('comboSection').appendChild(clone);
                }
            }
        }
    }
})();
</script>

</body>
</html>
